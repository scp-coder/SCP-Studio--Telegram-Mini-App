<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SCP Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="telegram-ready">

    <!-- ═══ Splash Screen ═══ -->
    <div id="splash-screen" class="splash-overlay">
        <div class="splash-content">
            <img src="icon.svg" alt="SCP Studio" class="splash-logo">
            <div class="splash-text">SCP STUDIO</div>
            <div class="splash-loader"></div>
        </div>
    </div>

    <div id="app" class="app-container">

        <!-- Action Bar -->
        <header class="action-bar-card">
            <div class="top-row">
                <div class="brand-group">
                    <img src="icon.svg" alt="SCP Studio" class="scp-app-logo">
                    <h1 class="app-title">SCP STUDIO</h1>
                </div>
                <button class="settings-btn" id="settings-trigger">
                    <svg class="btn-icon" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94zM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
                    </svg>
                </button>
            </div>
            <div class="tools-row">
                <div class="tool-chip" id="special-tools"><span>PROGRAMMER TOOLS</span></div>
            </div>
        </header>

        <!-- Tool List -->
        <main class="main-scroller">
            <section id="scp-list" class="recycler-view-emulation"></section>
        </main>
    </div>

    <!-- ═══ Settings Dialog ═══ -->
    <div id="dialog-overlay" class="dialog-overlay" onclick="closeSettings()"></div>

    <div id="settings-dialog" class="settings-dialog" role="dialog" aria-modal="true">

        <!-- Title bar -->
        <div class="dialog-title-bar">
            <h2 class="dialog-title">SCP Studio – Settings</h2>
            <button class="dialog-icon-btn" id="btn-about" title="About">
                <!-- icon_about.xml -->
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8s8 3.59 8 8s-3.59 8-8 8z" />
                </svg>
            </button>
        </div>

        <!-- Row 1: Theme · Anim -->
        <div class="dialog-row">
            <button class="dialog-cell" id="btn-theme">
                <!-- icon_mode.xml -->
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M17.66 5.41l.92.92l-2.69 2.69l-.92-.92l2.69-2.69M17.67 3c-.26 0-.51.1-.71.29l-3.12 3.12l-1.93-1.91l-1.41 1.41l1.42 1.42L3 16.25V21h4.75l8.92-8.92l1.42 1.42l1.41-1.41l-1.92-1.92l3.12-3.12c.4-.4.4-1.03.01-1.42l-2.34-2.34c-.2-.19-.45-.29-.7-.29zM6.92 19L5 17.08l8.06-8.06l1.92 1.92L6.92 19z" />
                </svg>
                <span>Theme</span>
            </button>
            <button class="dialog-cell" id="btn-anim">
                <!-- icon_animation.xml -->
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M15 2c-2.71 0-5.05 1.54-6.22 3.78a7.062 7.062 0 0 0-3 3A7.014 7.014 0 0 0 2 15c0 3.87 3.13 7 7 7c2.71 0 5.05-1.54 6.22-3.78a7.062 7.062 0 0 0 3-3A7.014 7.014 0 0 0 22 9c0-3.87-3.13-7-7-7zM9 20a5.002 5.002 0 0 1-4-8c0 3.87 3.13 7 7 7c-.84.63-1.88 1-3 1zm3-3a5.002 5.002 0 0 1-4-8c0 3.86 3.13 6.99 7 7c-.84.63-1.88 1-3 1zm4.7-3.3c-.53.19-1.1.3-1.7.3c-2.76 0-5-2.24-5-5c0-.6.11-1.17.3-1.7c.53-.19 1.1-.3 1.7-.3c2.76 0 5 2.24 5 5c0 .6-.11 1.17-.3 1.7zM19 12c0-3.86-3.13-6.99-7-7a5.002 5.002 0 0 1 7 7z" />
                </svg>
                <span>Anim</span>
            </button>
        </div>

        <!-- Row 2: Keyboard -->
        <div class="dialog-row">
            <button class="dialog-cell dialog-cell-wide" id="btn-keyboard">
                <!-- icon_keyboard.xml -->
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm8 7H9c-.55 0-1-.45-1-1s.45-1 1-1h6c.55 0 1 .45 1 1s-.45 1-1 1zm1-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z" />
                </svg>
                <span>Keyboard Shortcuts</span>
            </button>
        </div>


        <!-- Connect with us -->
        <div class="dialog-connect-row">
            <button class="dialog-social-btn" id="btn-telegram">
                <!-- icon_telegram.xml (#2196F3) -->
                <svg viewBox="0 0 24 24">
                    <path fill="#2196F3"
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19c-.14.75-.42 1-.68 1.03c-.58.05-1.02-.38-1.58-.75c-.88-.58-1.38-.94-2.23-1.5c-.99-.65-.35-1.01.22-1.59c.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02c-.09.02-1.49.95-4.22 2.79c-.4.27-.76.41-1.08.4c-.36-.01-1.04-.2-1.55-.37c-.63-.2-1.12-.31-1.08-.66c.02-.18.27-.36.74-.55c2.92-1.27 4.86-2.11 5.83-2.51c2.78-1.16 3.35-1.36 3.73-1.36c.08 0 .27.02.39.12c.1.08.13.19.14.27c-.01.06.01.24 0 .38z" />
                </svg>
            </button>
            <button class="dialog-social-btn" id="btn-discord">
                <!-- icon_discord.xml (#3F51B5) -->
                <svg viewBox="0 0 24 24">
                    <path fill="#3F51B5"
                        d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z" />
                </svg>
            </button>
            <span class="dialog-connect-label">Connect with us</span>
        </div>

    </div>

    <!-- ═══ KeyStore Tools Dialog ═══ -->
    <div id="ks-overlay" class="dialog-overlay" onclick="closeKeystore()"></div>
    <div id="ks-dialog" class="settings-dialog ks-dialog">
        <div class="dialog-title-bar">
            <h2 class="dialog-title">KeyStore Generator</h2>
            <button class="dialog-icon-btn" onclick="closeKeystore()">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </button>
        </div>

        <!-- Generation Form -->
        <div id="ks-form-view">
            <div class="ks-input-group">
                <div class="ks-section-label">Certificate Credentials</div>
                <input type="text" id="ks-alias" placeholder="Certificate Name (Alias)" class="ks-input">
                <input type="password" id="ks-pass" placeholder="Password" class="ks-input">
                <input type="password" id="ks-pass-confirm" placeholder="Confirm Password" class="ks-input">
                <input type="number" id="ks-validity" placeholder="Validity (Years)" value="25" class="ks-input">

                <div class="ks-divider"></div>

                <div class="ks-section-label">Certificate Details</div>
                <input type="text" id="ks-name" placeholder="First and Last Name (CN)" class="ks-input">
                <input type="text" id="ks-ou" placeholder="Organizational Unit (OU)" class="ks-input">
                <input type="text" id="ks-org" placeholder="Organization (O)" class="ks-input">
                <input type="text" id="ks-locality" placeholder="City or Locality (L)" class="ks-input">
                <input type="text" id="ks-state" placeholder="State or Province (ST)" class="ks-input">
                <input type="text" id="ks-country" placeholder="Country Code (e.g. US)" maxlength="2" class="ks-input">
            </div>

            <div class="ks-form-actions">
                <button class="dialog-cell ks-action-btn" id="btn-ks-autofill">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.14 11.58c0 .24-.1.49-.29.67L10.2 16.9a.996.996 0 0 1-1.41 0l-1.35-1.35a.996.996 0 1 1 1.41-1.41l.65.65l2.03-2.03l-.4-.4c-.19-.19-.29-.43-.29-.67s.1-.48.29-.67l3.22-3.22c.39-.39 1.02-.39 1.41 0l1.35 1.35c.39.39.39 1.02 0 1.41l-3.41 3.4z" />
                    </svg>
                    <span>Auto-fill</span>
                </button>
                <button class="dialog-cell dialog-cell-wide ks-gen-btn" id="btn-ks-generate">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 17a2 2 0 0 0 2-2 2 2 0 0 0-2-2 2 2 0 0 0-2 2 2 2 0 0 0 2 2m6-9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2h1V6a5 5 0 0 1 10 0v2h1m-6-5a3 3 0 0 0-3 3v2h6V6a3 3 0 0 0-3-3z" />
                    </svg>
                    <span>Create KeyStore</span>
                </button>
            </div>
        </div>

        <!-- Progress View -->
        <div id="ks-loading-view" class="ks-hidden">
            <div class="ks-progress-container">
                <div class="ks-progress-bar" id="ks-progress"></div>
            </div>
            <p class="ks-loading-text">Generating secure RSA-2048 keypair...</p>
        </div>

        <!-- Success Result View -->
        <div id="ks-success-view" class="ks-hidden">
            <div class="ks-result-card">
                <div class="ks-success-badge">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2m-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>
                </div>
                <h3 class="ks-result-title">Generation Success</h3>
                <div class="ks-details" id="ks-result-details">
                    <!-- Details injected here -->
                </div>
            </div>
            <div class="ks-actions">
                <button class="dialog-cell ks-action-btn" onclick="closeKeystore()">Close</button>
                <button class="dialog-cell ks-action-btn ks-download-btn" id="btn-ks-download">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor" d="M5 20h14v-2H5v2m14-9h-4V3H9v8H5l7 7 7-7z" />
                    </svg>
                    <span>Download .jks</span>
                </button>
            </div>
        </div>
    </div>

    <div class="scanner-line"></div>
    <div class="vignette"></div>
    <script src="script.js"></script>
</body>

</html>
